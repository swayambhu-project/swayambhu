name = "swayambhu-cns"
main = "brainstem.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat", "enable_ctx_exports"]

[[worker_loaders]]
binding = "LOADER"

# KV namespace binding
[[kv_namespaces]]
binding = "KV"
id = "05720444f9654ed4985fb67af4aea24d"

# Cron trigger — every minute. The hook checks wake_config.next_wake_after
# and goes back to sleep if it's not time yet. This gives the agent
# fine-grained control over its own wake frequency via sleep_seconds.
[triggers]
crons = ["* * * * *"]

# Secrets (set via: wrangler secret put SECRET_NAME)
# OPENROUTER_API_KEY
# SLACK_BOT_TOKEN
# SLACK_CHANNEL_ID
# SLACK_SIGNING_SECRET
# WALLET_ADDRESS
# WALLET_PRIVATE_KEY
